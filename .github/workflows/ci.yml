name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: vendor/bin/pint --test

  dependencies:
    name: Dependencies (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: [lint, dependencies]
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, sqlite3
          coverage: none
          tools: composer:v2

      - name: Create Laravel app
        run: |
          composer create-project laravel/laravel test-app --no-interaction --prefer-dist --quiet
          cd test-app
          composer config repositories.team-chat '{"type": "path", "url": "../"}'
          composer require qalainau/filament-team-chat:@dev --no-interaction --quiet
          composer require pestphp/pest pestphp/pest-plugin-laravel pestphp/pest-plugin-livewire --dev --no-interaction --quiet

      - name: Setup database and migrations
        working-directory: test-app
        run: |
          php artisan vendor:publish --tag=team-chat-migrations --no-interaction
          php artisan make:notifications-table --no-interaction

      - name: Prepare test environment
        working-directory: test-app
        run: |
          # Add HasTeamChat to User model
          sed -i 's/use HasFactory, Notifiable;/use HasFactory, \\Filament\\TeamChat\\Concerns\\HasTeamChat, Notifiable;/' app/Models/User.php

          # Create Filament AdminPanelProvider with plugin registered
          mkdir -p app/Providers/Filament
          cat > app/Providers/Filament/AdminPanelProvider.php << 'PROVIDER'
          <?php

          namespace App\Providers\Filament;

          use Filament\Http\Middleware\Authenticate;
          use Filament\Http\Middleware\AuthenticateSession;
          use Filament\Http\Middleware\DisableBladeIconComponents;
          use Filament\Http\Middleware\DispatchServingFilamentEvent;
          use Filament\Panel;
          use Filament\PanelProvider;
          use Filament\TeamChat\FilamentTeamChatPlugin;
          use Illuminate\Cookie\Middleware\AddQueuedCookiesToResponse;
          use Illuminate\Cookie\Middleware\EncryptCookies;
          use Illuminate\Foundation\Http\Middleware\PreventRequestForgery;
          use Illuminate\Routing\Middleware\SubstituteBindings;
          use Illuminate\Session\Middleware\StartSession;
          use Illuminate\View\Middleware\ShareErrorsFromSession;

          class AdminPanelProvider extends PanelProvider
          {
              public function panel(Panel $panel): Panel
              {
                  return $panel
                      ->default()
                      ->id('admin')
                      ->path('admin')
                      ->login()
                      ->middleware([
                          EncryptCookies::class,
                          AddQueuedCookiesToResponse::class,
                          StartSession::class,
                          AuthenticateSession::class,
                          ShareErrorsFromSession::class,
                          PreventRequestForgery::class,
                          SubstituteBindings::class,
                          DisableBladeIconComponents::class,
                          DispatchServingFilamentEvent::class,
                      ])
                      ->authMiddleware([
                          Authenticate::class,
                      ])
                      ->plugin(FilamentTeamChatPlugin::make());
              }
          }
          PROVIDER

          # Register the provider in bootstrap/providers.php
          sed -i 's|return \[|return [\n    \\App\\Providers\\Filament\\AdminPanelProvider::class,|' bootstrap/providers.php
          php artisan config:clear

          # Create Pest.php with RefreshDatabase
          cat > tests/Pest.php << 'PEST'
          <?php

          use Illuminate\Foundation\Testing\RefreshDatabase;
          use Tests\TestCase;

          pest()->extend(TestCase::class)
              ->use(RefreshDatabase::class)
              ->in('Feature');
          PEST

          # Copy package tests
          mkdir -p tests/Feature/TeamChat
          cp vendor/qalainau/filament-team-chat/tests/Feature/*.php tests/Feature/TeamChat/

      - name: Run tests
        working-directory: test-app
        run: php artisan test --compact --filter=TeamChat
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
